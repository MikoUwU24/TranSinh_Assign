version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: formbuilder_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: formbuilder
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: formbuilder_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/formbuilder"
      JWT_SECRET: "supersecret-change-in-prod"
      JWT_EXPIRES_IN: "7d"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "Admin@123"
      SW_USERNAME: "sw_user"
      SW_PASSWORD: "SW@123"
      PORT: 3001
      NODE_ENV: "production"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
